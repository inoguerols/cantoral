    <polygon points="170,150 342,120 342,150 170,180"/>
    <rect x="170" y="150" width="18" height="210" rx="9"/>
    <rect x="324" y="92" width="18" height="268" rx="9"/>
    <rect x="313" y="104" width="40" height="14" rx="7"/>
    <ellipse cx="152" cy="360" rx="46" ry="34" transform="rotate(-20 152 360)"/>
    <ellipse cx="306" cy="330" rx="46" ry="34" transform="rotate(-20 306 330)"/>
  </g>
</svg>
